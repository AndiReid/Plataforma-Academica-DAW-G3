<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento Académico | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <h2 class="fw-bold text-primary mb-2">Panel de Rendimiento</h2>
        <p class="text-muted mb-4">Información síncrona extraída desde la base de datos de calificaciones.</p>

        <div class="card shadow-sm border-0 rounded-4 p-4" id="contenedorPrincipal">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Cargando métricas de progreso...</p>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="../dashboard.html" class="btn btn-secondary btn-sm fw-bold">← Volver al Dashboard</a>
        </div>
    </div>

    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
            
            if (!usuarioActivo) {
                window.location.href = "../index.html";
                return;
            }

            if (usuarioActivo.rol === "Alumno") {
                cargarProgresoAlumno(usuarioActivo);
            } else {
                cargarProgresoDocente();
            }
        });

        function cargarProgresoAlumno(usuario) {
            fetch(`../../controlador/ProgresoControlador.php?accion=listar_alumno&nombre=${encodeURIComponent(usuario.nombre)}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    let html = `<h5 class="text-secondary mb-4">Progreso Personal: <span class="text-dark fw-bold">${usuario.nombre}</span></h5><div class="row g-4">`;
                    
                    if(data.data.length === 0) {
                        html += `<div class="col-12"><p class="text-muted text-center py-3">Aún no cuenta con registros de avance.</p></div>`;
                    }

                    data.data.forEach(p => {
                        let color = p.porcentaje_avance === 100 ? 'bg-success' : (p.porcentaje_avance >= 50 ? 'bg-warning text-dark' : 'bg-danger');
                        let btnDisabled = p.porcentaje_avance === 100 ? '' : 'disabled';
                        let btnClass = p.porcentaje_avance === 100 ? 'btn-outline-info text-dark fw-bold' : 'btn-secondary';
                        let btnText = p.porcentaje_avance === 100 ? 'Descargar Certificado' : 'Certificado Bloqueado';
                        let onclick = p.porcentaje_avance === 100 ? `onclick="generarCertificado('${p.curso}')"` : '';

                        html += `
                        <div class="col-md-6">
                            <div class="border rounded-3 p-3 bg-light shadow-sm">
                                <h6 class="fw-bold text-primary mb-1">${p.curso}</h6>
                                <p class="small text-muted mb-2">Promedio: <b class="text-dark">${p.promedio}</b> / 10</p>
                                <div class="progress mb-3" style="height: 18px;">
                                    <div class="progress-bar ${color} fw-bold" style="width: ${p.porcentaje_avance}%; font-size: 11px;">${p.porcentaje_avance}%</div>
                                </div>
                                <button class="btn ${btnClass} btn-sm w-100" ${btnDisabled} ${onclick}>${btnText}</button>
                            </div>
                        </div>`;
                    });
                    
                    html += `</div>`;
                    document.getElementById("contenedorPrincipal").innerHTML = html;
                }
            });
        }

        function cargarProgresoDocente() {
            fetch('../../controlador/ProgresoControlador.php?accion=listar_todo')
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    let html = `
                    <h5 class="text-secondary mb-4">Monitoreo General de la Clase</h5>
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Estudiante</th>
                                    <th>Curso</th>
                                    <th>Promedio</th>
                                    <th>Nivel de Avance</th>
                                    <th class="text-center">Estado</th>
                                </tr>
                            </thead>
                            <tbody>`;
                    
                    if(data.data.length === 0) {
                        html += `<tr><td colspan="5" class="text-center text-muted">No se registran transacciones.</td></tr>`;
                    }

                    data.data.forEach(p => {
                        let color = p.porcentaje_avance === 100 ? 'bg-success' : (p.porcentaje_avance >= 50 ? 'bg-warning text-dark' : 'bg-danger');
                        let badgeColor = p.estado === 'Aprobado' ? 'bg-success' : (p.estado === 'En Curso' ? 'bg-warning text-dark' : 'bg-danger');
                        
                        html += `
                            <tr>
                                <td class="fw-bold text-dark">${p.nombre_alumno}</td>
                                <td class="small text-secondary">${p.curso}</td>
                                <td class="fw-semibold">${p.promedio}</td>
                                <td>
                                    <div class="progress" style="height: 12px;">
                                        <div class="progress-bar ${color}" style="width: ${p.porcentaje_avance}%;"></div>
                                    </div>
                                </td>
                                <td class="text-center"><span class="badge ${badgeColor}">${p.estado}</span></td>
                            </tr>`;
                    });

                    html += `</tbody></table></div>`;
                    document.getElementById("contenedorPrincipal").innerHTML = html;
                }
            });
        }

        window.generarCertificado = function(curso) {
            localStorage.setItem("cursoCertificado", curso);
            window.location.href = "certificado.html";
        }
    </script>
</body>
</html>
