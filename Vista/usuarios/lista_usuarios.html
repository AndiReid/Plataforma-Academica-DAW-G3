<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary">Control de Usuarios</h2>
            <a href="agregar_usuarios.html" class="btn btn-primary fw-bold shadow-sm" id="btnAgregar">
                + Registrar Nuevo Usuario
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre Completo</th>
                                <th>Correo Electrónico</th>
                                <th>Rol del Sistema</th>
                                <th class="text-center" id="columnaAcciones">Acciones</th>
                            </tr>
                        </thead>
                        
                        <tbody id="tablaUsuarios"></tbody>

                    </table>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="../dashboard.html" class="btn btn-secondary btn-sm fw-bold">← Volver al Dashboard</a>
        </div>

    </div>

    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
            let tabla = document.getElementById("tablaUsuarios");
            
            let esAlumno = (usuarioActivo && usuarioActivo.rol === "Alumno");
            if(esAlumno) {
                let btnAgregar = document.getElementById("btnAgregar");
                let colAcciones = document.getElementById("columnaAcciones");
                if(btnAgregar) btnAgregar.style.display = "none";
                if(colAcciones) colAcciones.style.display = "none";
            }

            function cargarUsuarios() {
                fetch('../../controlador/UsuarioControlador.php?accion=listar')
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        tabla.innerHTML = "";
                        data.data.forEach((u) => {
                            let badgeClass = u.rol === "Docente" ? "bg-primary" : "bg-secondary";
                            let botones = "";
                            
                            if(!esAlumno) {
                                botones = `
                                <td class="text-center">
                                    <button class="btn btn-warning btn-sm text-dark fw-bold" onclick="editar(${u.id_usuario})">Editar</button>
                                    <button class="btn btn-danger btn-sm fw-bold" onclick="eliminar(${u.id_usuario})">Eliminar</button>
                                </td>`;
                            }

                            tabla.innerHTML += `
                            <tr>
                                <td class="fw-bold text-dark">${u.nombre}</td>
                                <td>${u.correo}</td>
                                <td><span class="badge ${badgeClass}">${u.rol}</span></td>
                                ${botones}
                            </tr>`;
                        });
                    }
                })
                .catch(error => console.error('Error:', error));
            }

            window.eliminar = function(id_usuario) {
                if(confirm("¿Está seguro de eliminar este usuario del sistema?")) {
                    let formData = new FormData();
                    formData.append('accion', 'eliminar');
                    formData.append('id_usuario', id_usuario);

                    fetch('../../controlador/UsuarioControlador.php', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'success') {
                            cargarUsuarios();
                        } else {
                            alert(data.mensaje);
                        }
                    });
                }
            }

            window.editar = function(id_usuario) {
                localStorage.setItem("editarUsuarioID", id_usuario);
                window.location.href = "editar_usuarios.html";
            }

            cargarUsuarios();
        });
    </script>
</body>
</html>
