<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <script src="../js/navegacion.js"></script>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Información del Perfil</h4>
                    </div>
                    <div class="card-body p-4 text-center">
                        <div class="mb-4">
                            <div class="bg-secondary bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center" style="width: 100px; height: 100px;">
                                <span class="fs-1 text-primary" id="inicialUsuario">U</span>
                            </div>
                        </div>
                        
                        <h3 class="fw-bold text-dark" id="nombrePerfil">Cargando...</h3>
                        <p class="text-muted mb-4" id="correoPerfil">Cargando...</p>
                        
                        <hr>
                        
                        <div class="d-flex justify-content-between px-3 mt-3">
                            <span class="fw-bold">Nivel de Acceso:</span>
                            <span class="badge bg-success fs-6" id="rolPerfil">Cargando...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let usuario = JSON.parse(localStorage.getItem("usuarioActivo"));
            
            if(usuario) {
                document.getElementById("nombrePerfil").innerText = usuario.nombre;
                document.getElementById("correoPerfil").innerText = usuario.correo;
                document.getElementById("rolPerfil").innerText = usuario.rol;
                
                
                document.getElementById("inicialUsuario").innerText = usuario.nombre.charAt(0).toUpperCase();
            } else {
                window.location.href = "../index.html";
            }
        });
    </script>
</body>
</html>
