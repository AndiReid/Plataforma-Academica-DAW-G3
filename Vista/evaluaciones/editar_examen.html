<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Examen | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 900px;">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold text-warning mb-4">Modificar Parámetros del Examen</h3>

                <form id="formEditarExamen">
                    <h5 class="fw-bold mb-3">Datos generales</h5>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary" for="tituloEdit">Título de la Evaluación</label>
                        <input type="text" id="tituloEdit" class="form-control bg-light border-0" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary" for="cursoEdit">Curso / Materia</label>
                        <input type="text" id="cursoEdit" class="form-control bg-light border-0" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-secondary" for="fechaEdit">Fecha de Aplicación</label>
                            <input type="date" id="fechaEdit" class="form-control bg-light border-0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-secondary" for="duracionEdit">Duración Límite (minutos)</label>
                            <input type="number" id="duracionEdit" class="form-control bg-light border-0"
                                min="5" max="180" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary" for="instruccionesEdit">Reglas e Instrucciones</label>
                        <textarea id="instruccionesEdit" class="form-control bg-light border-0" rows="4" required></textarea>
                    </div>

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
                        <div>
                            <h5 class="fw-bold mb-1">Preguntas y respuestas</h5>
                            <small class="text-muted">Puede agregar, modificar o eliminar preguntas y opciones.</small>
                        </div>
                        <button type="button" id="btnAgregarPregunta" class="btn btn-outline-warning fw-bold">
                            + Agregar pregunta
                        </button>
                    </div>

                    <div id="contenedorPreguntas">
                        <div class="text-center text-muted py-4">Cargando preguntas...</div>
                    </div>

                    <div id="mensajeFormulario" class="alert d-none" role="alert"></div>

                    <div class="d-flex flex-column flex-md-row gap-2 mt-4">
                        <button type="submit" id="btnActualizar" class="btn btn-warning text-dark fw-bold w-100">
                            Actualizar Evaluación
                        </button>
                        <a href="lista_examenes.html" class="btn btn-secondary fw-bold w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/navegacion.js"></script>
    <script src="js/editor_preguntas.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const idExamen = localStorage.getItem('editarExamenID');
            const formulario = document.getElementById('formEditarExamen');
            const botonActualizar = document.getElementById('btnActualizar');
            const mensaje = document.getElementById('mensajeFormulario');

            if (!idExamen) {
                window.location.href = 'lista_examenes.html';
                return;
            }

            document.getElementById('btnAgregarPregunta').addEventListener('click', function () {
                EditorPreguntas.crearPregunta();
            });

            try {
                // GET mediante fetch (AJAX) para cargar el examen y sus preguntas.
                const response = await fetch(
                    `../../controlador/ExamenControlador.php?accion=obtener&id_examen=${encodeURIComponent(idExamen)}`
                );
                const data = await response.json();

                if (!response.ok || data.status !== 'success') {
                    throw new Error(data.mensaje || 'No fue posible cargar la evaluación.');
                }

                const examen = data.examen;
                document.getElementById('tituloEdit').value = examen.titulo;
                document.getElementById('cursoEdit').value = examen.curso;
                document.getElementById('fechaEdit').value = examen.fecha;
                document.getElementById('duracionEdit').value = examen.duracion;
                document.getElementById('instruccionesEdit').value = examen.instrucciones;
                EditorPreguntas.cargarPreguntas(examen.preguntas);
            } catch (error) {
                mensaje.textContent = error.message;
                mensaje.className = 'alert alert-danger';
                document.getElementById('contenedorPreguntas').innerHTML = '';
            }

            formulario.addEventListener('submit', async function (event) {
                event.preventDefault();
                mensaje.className = 'alert d-none';

                try {
                    const preguntas = EditorPreguntas.obtenerPreguntas();
                    const formData = new FormData();
                    formData.append('accion', 'actualizar');
                    formData.append('id_examen', idExamen);
                    formData.append('titulo', document.getElementById('tituloEdit').value.trim());
                    formData.append('curso', document.getElementById('cursoEdit').value.trim());
                    formData.append('fecha', document.getElementById('fechaEdit').value);
                    formData.append('duracion', document.getElementById('duracionEdit').value);
                    formData.append('instrucciones', document.getElementById('instruccionesEdit').value.trim());
                    formData.append('preguntas', JSON.stringify(preguntas));

                    botonActualizar.disabled = true;
                    botonActualizar.textContent = 'Actualizando...';

                    // POST mediante fetch (AJAX) para actualizar datos generales, preguntas y respuestas.
                    const response = await fetch('../../controlador/ExamenControlador.php', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (!response.ok || data.status !== 'success') {
                        throw new Error(data.mensaje || 'No fue posible actualizar la evaluación.');
                    }

                    alert(data.mensaje);
                    localStorage.removeItem('editarExamenID');
                    window.location.href = 'lista_examenes.html';
                } catch (error) {
                    mensaje.textContent = error.message;
                    mensaje.className = 'alert alert-danger';
                } finally {
                    botonActualizar.disabled = false;
                    botonActualizar.textContent = 'Actualizar Evaluación';
                }
            });
        });
    </script>
</body>
</html>
