<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programar Examen | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 900px;">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold text-danger mb-4">Programar Nueva Evaluación</h3>

                <form id="formCreateExamen">
                    <h5 class="fw-bold mb-3">Datos generales</h5>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary" for="tituloExamen">Título de la Evaluación</label>
                        <input type="text" id="tituloExamen" class="form-control bg-light border-0" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary" for="cursoExamen">Curso / Materia correspondiente</label>
                        <input type="text" id="cursoExamen" class="form-control bg-light border-0" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-secondary" for="fechaExamen">Fecha de Aplicación</label>
                            <input type="date" id="fechaExamen" class="form-control bg-light border-0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-secondary" for="duracionExamen">Duración (en minutos)</label>
                            <input type="number" id="duracionExamen" class="form-control bg-light border-0"
                                min="5" max="180" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary" for="instruccionesExamen">Reglas e Instrucciones</label>
                        <textarea id="instruccionesExamen" class="form-control bg-light border-0" rows="4" required></textarea>
                    </div>

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
                        <div>
                            <h5 class="fw-bold mb-1">Preguntas y respuestas</h5>
                            <small class="text-muted">Cada pregunta debe tener al menos dos opciones y una sola respuesta correcta.</small>
                        </div>
                        <button type="button" id="btnAgregarPregunta" class="btn btn-outline-danger fw-bold">
                            + Agregar pregunta
                        </button>
                    </div>

                    <div id="contenedorPreguntas"></div>

                    <div id="mensajeFormulario" class="alert d-none" role="alert"></div>

                    <div class="d-flex flex-column flex-md-row gap-2 mt-4">
                        <button type="submit" id="btnGuardar" class="btn btn-danger fw-bold w-100">
                            Agendar Examen
                        </button>
                        <a href="lista_examenes.html" class="btn btn-secondary fw-bold w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/navegacion.js"></script>
    <script src="js/editor_preguntas.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const formulario = document.getElementById('formCreateExamen');
            const botonGuardar = document.getElementById('btnGuardar');
            const mensaje = document.getElementById('mensajeFormulario');

            EditorPreguntas.crearPregunta();

            document.getElementById('btnAgregarPregunta').addEventListener('click', function () {
                EditorPreguntas.crearPregunta();
            });

            formulario.addEventListener('submit', async function (event) {
                event.preventDefault();
                mensaje.className = 'alert d-none';

                try {
                    const preguntas = EditorPreguntas.obtenerPreguntas();
                    const formData = new FormData();
                    formData.append('accion', 'registrar');
                    formData.append('titulo', document.getElementById('tituloExamen').value.trim());
                    formData.append('curso', document.getElementById('cursoExamen').value.trim());
                    formData.append('fecha', document.getElementById('fechaExamen').value);
                    formData.append('duracion', document.getElementById('duracionExamen').value);
                    formData.append('instrucciones', document.getElementById('instruccionesExamen').value.trim());
                    formData.append('preguntas', JSON.stringify(preguntas));

                    botonGuardar.disabled = true;
                    botonGuardar.textContent = 'Guardando...';

                    // fetch realiza la petición AJAX sin recargar la página.
                    const response = await fetch('../../controlador/ExamenControlador.php', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (!response.ok || data.status !== 'success') {
                        throw new Error(data.mensaje || 'No fue posible guardar la evaluación.');
                    }

                    alert(data.mensaje);
                    window.location.href = 'lista_examenes.html';
                } catch (error) {
                    mensaje.textContent = error.message;
                    mensaje.className = 'alert alert-danger';
                } finally {
                    botonGuardar.disabled = false;
                    botonGuardar.textContent = 'Agendar Examen';
                }
            });
        });
    </script>
</body>
</html>
