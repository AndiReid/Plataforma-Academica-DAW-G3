<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendir Evaluación | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="fw-bold text-danger mb-2" id="lblTitle">Cargando evaluación...</h2>
                        <p class="text-muted mb-4">
                            Tiempo estimado: <b class="text-dark" id="lblDuracion">--</b> minutos
                        </p>

                        <h6 class="fw-bold text-dark mb-2">Instrucciones obligatorias:</h6>
                        <div class="bg-warning bg-opacity-10 border border-warning p-3 rounded-3 mb-4"
                            id="lblInstrucciones">Cargando indicaciones...</div>

                        <form id="formResolucion">
                            <div id="contenedorPreguntas">
                                <div class="text-center text-muted py-4">Cargando preguntas...</div>
                            </div>

                            <div id="mensajeExamen" class="alert d-none" role="alert"></div>

                            <button type="submit" id="btnEnviarExamen"
                                class="btn btn-danger fw-bold w-100 py-2 shadow-sm mt-3">
                                Enviar mis respuestas para calificación
                            </button>
                        </form>
                    </div>
                </div>

                <div class="text-center">
                    <a href="lista_examenes.html" class="btn btn-secondary fw-bold px-4">← Salir de la Evaluación</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const idExamen = localStorage.getItem('detalleExamenID');
            const usuarioActivo = JSON.parse(localStorage.getItem('usuarioActivo'));
            const esDocente = usuarioActivo && usuarioActivo.rol === 'Docente';
            const contenedor = document.getElementById('contenedorPreguntas');
            const formulario = document.getElementById('formResolucion');
            const botonEnviar = document.getElementById('btnEnviarExamen');
            const mensaje = document.getElementById('mensajeExamen');

            if (!idExamen) {
                window.location.href = 'lista_examenes.html';
                return;
            }

            function mostrarPreguntas(preguntas) {
                contenedor.innerHTML = '';

                if (!Array.isArray(preguntas) || preguntas.length === 0) {
                    contenedor.innerHTML = `
                        <div class="alert alert-warning">
                            Esta evaluación todavía no tiene preguntas. El docente debe agregarlas desde la opción Editar.
                        </div>`;
                    botonEnviar.disabled = true;
                    return;
                }

                preguntas.forEach(function (pregunta, indice) {
                    const bloque = document.createElement('div');
                    bloque.className = 'card border mb-4';

                    const cuerpo = document.createElement('div');
                    cuerpo.className = 'card-body';

                    const titulo = document.createElement('p');
                    titulo.className = 'fw-bold text-dark mb-3';
                    titulo.textContent = `Pregunta ${indice + 1}: ${pregunta.enunciado}`;
                    cuerpo.appendChild(titulo);

                    pregunta.respuestas.forEach(function (respuesta) {
                        const fila = document.createElement('div');
                        fila.className = 'form-check mb-2 d-flex align-items-center gap-2';

                        const radio = document.createElement('input');
                        radio.className = 'form-check-input';
                        radio.type = 'radio';
                        radio.name = `pregunta_${pregunta.id_pregunta}`;
                        radio.id = `respuesta_${respuesta.id_respuesta}`;
                        radio.value = respuesta.id_respuesta;
                        radio.required = true;
                        radio.disabled = esDocente;

                        const etiqueta = document.createElement('label');
                        etiqueta.className = 'form-check-label text-secondary flex-grow-1';
                        etiqueta.htmlFor = radio.id;
                        etiqueta.textContent = respuesta.texto_respuesta;

                        fila.appendChild(radio);
                        fila.appendChild(etiqueta);

                        if (esDocente && Number(respuesta.es_correcta) === 1) {
                            const insignia = document.createElement('span');
                            insignia.className = 'badge bg-success';
                            insignia.textContent = 'Correcta';
                            fila.appendChild(insignia);
                        }

                        cuerpo.appendChild(fila);
                    });

                    bloque.appendChild(cuerpo);
                    contenedor.appendChild(bloque);
                });
            }

            try {
                // El docente recibe las marcas de respuesta correcta; el alumno no.
                const accion = esDocente ? 'obtener' : 'resolver';
                const response = await fetch(
                    `../../controlador/ExamenControlador.php?accion=${accion}&id_examen=${encodeURIComponent(idExamen)}`
                );
                const data = await response.json();

                if (!response.ok || data.status !== 'success') {
                    throw new Error(data.mensaje || 'No fue posible cargar la evaluación.');
                }

                const examen = data.examen;
                document.getElementById('lblTitle').textContent = examen.titulo;
                document.getElementById('lblDuracion').textContent = examen.duracion;
                document.getElementById('lblInstrucciones').textContent = examen.instrucciones;
                mostrarPreguntas(examen.preguntas);

                if (esDocente) {
                    botonEnviar.disabled = true;
                    botonEnviar.className = 'btn btn-secondary w-100 fw-bold mt-3';
                    botonEnviar.textContent = 'Vista de docente: envío deshabilitado';
                }
            } catch (error) {
                contenedor.innerHTML = '';
                mensaje.textContent = error.message;
                mensaje.className = 'alert alert-danger';
                botonEnviar.disabled = true;
            }

            formulario.addEventListener('submit', async function (event) {
                event.preventDefault();
                if (esDocente) return;

                const respuestas = {};
                const grupos = contenedor.querySelectorAll('.card');

                for (const grupo of grupos) {
                    const radioSeleccionado = grupo.querySelector('input[type="radio"]:checked');
                    if (!radioSeleccionado) {
                        mensaje.textContent = 'Debe responder todas las preguntas antes de enviar la evaluación.';
                        mensaje.className = 'alert alert-warning';
                        return;
                    }

                    const idPregunta = radioSeleccionado.name.replace('pregunta_', '');
                    respuestas[idPregunta] = radioSeleccionado.value;
                }

                const formData = new FormData();
                formData.append('accion', 'calificar');
                formData.append('id_examen', idExamen);
                formData.append('respuestas', JSON.stringify(respuestas));

                botonEnviar.disabled = true;
                botonEnviar.textContent = 'Calificando...';

                try {
                    // POST mediante fetch: petición AJAX al controlador para calificar en el servidor.
                    const response = await fetch('../../controlador/ExamenControlador.php', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (!response.ok || data.status !== 'success') {
                        throw new Error(data.mensaje || 'No fue posible calificar la evaluación.');
                    }

                    const resultado = data.resultado;
                    mensaje.innerHTML = `
                        <strong>Evaluación finalizada.</strong><br>
                        Respuestas correctas: ${resultado.correctas} de ${resultado.total}.<br>
                        Calificación: ${resultado.nota_sobre_10}/10 (${resultado.porcentaje}%).`;
                    mensaje.className = 'alert alert-success';
                    contenedor.querySelectorAll('input[type="radio"]').forEach(input => input.disabled = true);
                    botonEnviar.textContent = 'Evaluación enviada';
                } catch (error) {
                    mensaje.textContent = error.message;
                    mensaje.className = 'alert alert-danger';
                    botonEnviar.disabled = false;
                    botonEnviar.textContent = 'Enviar mis respuestas para calificación';
                }
            });
        });
    </script>
</body>
</html>
