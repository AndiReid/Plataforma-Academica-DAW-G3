<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5" id="contenedorPrincipal">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary">Gestión de Tareas</h2>
            <a href="crear_tarea.html" class="btn btn-primary fw-bold shadow-sm" id="btnCrearTarea">
                + Crear Nueva Tarea
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Título de la Tarea</th>
                                <th>Curso Asignado</th>
                                <th>Fecha Límite</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        
                        <tbody id="tablaTareas">
                            </tbody>

                    </table>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="../dashboard.html" class="btn btn-secondary btn-sm fw-bold">← Volver al Dashboard</a>
        </div>

    </div>

    <script src="../js/navegacion.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
            let tabla = document.getElementById("tablaTareas");
            
            let esAlumno = (usuarioActivo && usuarioActivo.rol === "Alumno");

            if(esAlumno) {
                let btnCrear = document.getElementById("btnCrearTarea"); 
                if(btnCrear) btnCrear.style.display = "none";
            }

            function cargarTareas() {
                fetch('../../controlador/TareaControlador.php?accion=listar')
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        tabla.innerHTML = "";
                        
                        if(data.data.length === 0) {
                            tabla.innerHTML = "<tr><td colspan='4' class='text-center text-muted py-4'>No hay tareas asignadas en este momento.</td></tr>";
                            return;
                        }

                        data.data.forEach((t) => {
                            let botonesAccion = "";
                            
                            if(esAlumno) {
                                botonesAccion = `<button class="btn btn-outline-warning text-dark btn-sm fw-bold px-4" onclick="verDetalle(${t.id_tarea})">Entregar</button>`;
                            } else {
                                botonesAccion = `
                                    <button class="btn btn-outline-warning text-dark btn-sm fw-bold" onclick="verDetalle(${t.id_tarea})">Ver</button>
                                    <button class="btn btn-primary btn-sm fw-bold" onclick="editarTarea(${t.id_tarea})">Editar</button>
                                    <button class="btn btn-danger btn-sm fw-bold" onclick="eliminarTarea(${t.id_tarea})">Borrar</button>
                                `;
                            }

                            tabla.innerHTML += `
                            <tr>
                                <td class="fw-bold text-dark">${t.titulo}</td>
                                <td class="text-secondary">${t.curso}</td>
                                <td><span class="badge bg-danger">${t.fecha_limite}</span></td>
                                <td class="text-center d-flex gap-1 justify-content-center">
                                    ${botonesAccion}
                                </td>
                            </tr>`;
                        });
                    }
                })
                .catch(error => console.error('Error:', error));
            }

            window.eliminarTarea = function(id_tarea) {
                if(confirm("¿Está seguro de eliminar esta asignación?")) {
                    let formData = new FormData();
                    formData.append('accion', 'eliminar');
                    formData.append('id_tarea', id_tarea);

                    fetch('../../controlador/TareaControlador.php', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'success') {
                            cargarTareas();
                        } else {
                            alert(data.mensaje);
                        }
                    });
                }
            }

            window.editarTarea = function(id_tarea) {
                localStorage.setItem("editarTareaID", id_tarea);
                window.location.href = "editar_tarea.html";
            }

            window.verDetalle = function(id_tarea) {
                localStorage.setItem("detalleTareaID", id_tarea);
                window.location.href = "detalle_tarea.html";
            }

            cargarTareas();
        });
    </script>
</body>
</html>
