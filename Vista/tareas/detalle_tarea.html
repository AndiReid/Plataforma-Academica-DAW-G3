<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Tarea | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="fw-bold text-primary mb-3" id="lblTitulo">Cargando título...</h3>
                        
                        <div class="d-flex flex-wrap gap-2 mb-4">
                            <span class="badge bg-info text-dark px-3 py-2 fs-6"><span id="lblCurso">Curso</span></span>
                            <span class="badge bg-danger px-3 py-2 fs-6">Límite: <span id="lblFecha">Fecha</span></span>
                        </div>
                        
                        <h6 class="fw-bold text-secondary mb-3">Instrucciones de la Asignación:</h6>
                        <div class="bg-light p-4 rounded-3 border">
                            <p class="text-dark mb-0" id="lblDescripcion" style="white-space: pre-wrap;">Cargando instrucciones de la base de datos...</p>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0 rounded-4 border-top border-warning border-4" id="panelEntrega">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold text-dark mb-4">Entregar Asignación</h4>
                        <form id="formEntrega">
                            <div class="mb-3">
                                <label class="form-label fw-semibold text-secondary small">Adjuntar Archivo (PDF, DOCX, ZIP)</label>
                                <input class="form-control bg-light border-0" type="file" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold text-secondary small">Comentarios adicionales al docente (Opcional)</label>
                                <textarea class="form-control bg-light border-0" rows="3" placeholder="Escribe un mensaje..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-warning text-dark fw-bold w-100 py-2 shadow-sm">Subir y Entregar Tarea</button>
                        </form>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <a href="lista_tareas.html" class="btn btn-secondary fw-bold px-5">← Volver al Listado de Tareas</a>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/navegacion.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let id_tarea = localStorage.getItem("detalleTareaID");
            let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));

            if(!id_tarea) {
                window.location.href = "lista_tareas.html";
                return;
            }

            fetch(`../../controlador/TareaControlador.php?accion=obtener&id_tarea=${id_tarea}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    let t = data.tarea;
                    document.getElementById("lblTitulo").innerText = t.titulo;
                    document.getElementById("lblCurso").innerText = t.curso;
                    document.getElementById("lblFecha").innerText = t.fecha_limite;
                    document.getElementById("lblDescripcion").innerText = t.descripcion;
                    
                    if (usuarioActivo && usuarioActivo.rol === "Docente") {
                        let panelEntrega = document.getElementById("panelEntrega");
                        if(panelEntrega) panelEntrega.style.display = "none";
                    }
                } else {
                    alert("Error al cargar la información de la tarea.");
                    window.location.href = "lista_tareas.html";
                }
            })
            .catch(error => console.error('Error:', error));

            let formEntrega = document.getElementById("formEntrega");
            if(formEntrega) {
                formEntrega.addEventListener("submit", function(e) {
                    e.preventDefault();
                    alert("¡Archivo subido exitosamente! Tu tarea ha sido entregada para su respectiva calificación.");
                    window.location.href = "lista_tareas.html";
                });
            }
        });
    </script>
</body>
</html>
