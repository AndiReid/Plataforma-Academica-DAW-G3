<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Tarea | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 600px;">
            <div class="card-body p-5">
                <h3 class="fw-bold text-warning mb-4">Modificar Tarea</h3>
                <form id="formEditarTarea">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Título de la Tarea</label>
                        <input type="text" id="tituloEdit" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Curso / Materia</label>
                        <input type="text" id="cursoEdit" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Fecha Límite</label>
                        <input type="date" id="fechaEdit" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Instrucciones / Descripción</label>
                        <textarea id="descripcionEdit" class="form-control bg-light border-0" rows="4" required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-dark fw-bold w-100">Actualizar Tarea</button>
                        <a href="lista_tareas.html" class="btn btn-secondary fw-bold w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let id_tarea = localStorage.getItem("editarTareaID");
            if(!id_tarea) { window.location.href = "lista_tareas.html"; return; }

            // Cargar datos de la tarea
            fetch(`../../controlador/TareaControlador.php?accion=obtener&id_tarea=${id_tarea}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById("tituloEdit").value = data.tarea.titulo;
                    document.getElementById("cursoEdit").value = data.tarea.curso;
                    document.getElementById("fechaEdit").value = data.tarea.fecha_limite;
                    document.getElementById("descripcionEdit").value = data.tarea.descripcion;
                } else {
                    window.location.href = "lista_tareas.html";
                }
            });

            // Enviar datos modificados
            document.getElementById("formEditarTarea").addEventListener("submit", function(e){
                e.preventDefault();
                let formData = new FormData();
                formData.append('accion', 'actualizar');
                formData.append('id_tarea', id_tarea);
                formData.append('titulo', document.getElementById("tituloEdit").value);
                formData.append('curso', document.getElementById("cursoEdit").value);
                formData.append('fecha_limite', document.getElementById("fechaEdit").value);
                formData.append('descripcion', document.getElementById("descripcionEdit").value);

                fetch('../../controlador/TareaControlador.php', { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert("Tarea actualizada correctamente");
                        window.location.href = "lista_tareas.html";
                    } else { alert(data.mensaje); }
                });
            });
        });
    </script>
</body>
</html>
