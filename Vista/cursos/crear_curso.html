<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Curso | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 600px;">
            <div class="card-body p-5">
                <h3 class="fw-bold text-primary mb-4">Ofertar Nuevo Curso</h3>
                <form id="formCrearCurso">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nombre de la Asignatura</label>
                        <input type="text" id="nombreCurso" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Categoría / Área</label>
                        <input type="text" id="categoriaCurso" class="form-control bg-light border-0" placeholder="Ej. Desarrollo Web, Bases de Datos" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Docente Responsable</label>
                        <input type="text" id="docenteCurso" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Descripción Detallada</label>
                        <textarea id="descripcionCurso" class="form-control bg-light border-0" rows="4" required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary fw-bold w-100">Guardar Curso</button>
                        <a href="lista_cursos.html" class="btn btn-secondary fw-bold w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("formCrearCurso").addEventListener("submit", function(e){
                e.preventDefault();
                let formData = new FormData();
                formData.append('accion', 'registrar');
                formData.append('nombre', document.getElementById("nombreCurso").value);
                formData.append('categoria', document.getElementById("categoriaCurso").value);
                formData.append('docente', document.getElementById("docenteCurso").value);
                formData.append('descripcion', document.getElementById("descripcionCurso").value);

                fetch('../../controlador/CursoControlador.php', { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert("Curso registrado exitosamente en el sistema.");
                        window.location.href = "lista_cursos.html";
                    } else { alert(data.mensaje); }
                })
                .catch(error => console.error('Error:', error));
            });
        });
    </script>
</body>
</html>
