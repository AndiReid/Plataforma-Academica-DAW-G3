<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalles del Curso | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 rounded-4 mx-auto mb-4" style="max-width: 800px;">
            <div class="card-body p-5">
                <h2 class="fw-bold text-success mb-3" id="lblNombre">Cargando Asignatura...</h2>
                <div class="d-flex gap-2 mb-4">
                    <span class="badge bg-secondary px-3 py-2 fs-6">Categoría: <span id="lblCategoria">...</span></span>
                    <span class="badge bg-primary px-3 py-2 fs-6">Docente: <span id="lblDocente">...</span></span>
                </div>
                <h5 class="fw-bold text-secondary mb-3">Acerca de este curso:</h5>
                <div class="bg-white p-4 rounded-3 border mb-4">
                    <p class="text-dark mb-0" id="lblDescripcion" style="white-space: pre-wrap;">Cargando información desde la base de datos...</p>
                </div>
                <button id="btnInscribir" class="btn btn-success fw-bold w-100 py-2 fs-5 shadow-sm" style="display: none;" onclick="inscribirse()">
                    ✓ Matricularme en esta asignatura
                </button>
            </div>
        </div>
        <div class="text-center">
            <a href="lista_cursos.html" class="btn btn-secondary fw-bold px-4">← Volver al Catálogo</a>
        </div>
    </div>
    
    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let id_curso = localStorage.getItem("detalleCursoID");
            let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));

            if(!id_curso) { window.location.href = "lista_cursos.html"; return; }

            fetch(`../../controlador/CursoControlador.php?accion=obtener&id_curso=${id_curso}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    let c = data.curso;
                    document.getElementById("lblNombre").innerText = c.nombre;
                    document.getElementById("lblCategoria").innerText = c.categoria;
                    document.getElementById("lblDocente").innerText = c.docente;
                    document.getElementById("lblDescripcion").innerText = c.descripcion;
                    
                    if (usuarioActivo && usuarioActivo.rol === "Alumno") {
                        document.getElementById("btnInscribir").style.display = "inline-block";
                    }
                } else { window.location.href = "lista_cursos.html"; }
            });
        });

        function inscribirse() {
            alert("¡Matrícula exitosa! Te has inscrito en este curso de manera síncrona.");
            window.location.href = "lista_cursos.html";
        }
    </script>
</body>
</html>
