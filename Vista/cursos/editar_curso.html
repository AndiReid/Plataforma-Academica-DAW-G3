<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Curso | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 600px;">
            <div class="card-body p-5">
                <h3 class="fw-bold text-warning mb-4">Modificar Información del Curso</h3>
                <form id="formEditarCurso">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nombre de la Asignatura</label>
                        <input type="text" id="nombreEdit" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Categoría / Área</label>
                        <input type="text" id="categoriaEdit" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Docente Responsable</label>
                        <input type="text" id="docenteEdit" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Descripción General</label>
                        <textarea id="descripcionEdit" class="form-control bg-light border-0" rows="4" required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-dark fw-bold w-100">Actualizar Cambios</button>
                        <a href="lista_cursos.html" class="btn btn-secondary fw-bold w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let id_curso = localStorage.getItem("editarCursoID");
            if(!id_curso) { window.location.href = "lista_cursos.html"; return; }

            // Cargar datos actuales desde MySQL
            fetch(`../../controlador/CursoControlador.php?accion=obtener&id_curso=${id_curso}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById("nombreEdit").value = data.curso.nombre;
                    document.getElementById("categoriaEdit").value = data.curso.categoria;
                    document.getElementById("docenteEdit").value = data.curso.docente;
                    document.getElementById("descripcionEdit").value = data.curso.descripcion;
                } else { window.location.href = "lista_cursos.html"; }
            });

            // Enviar cambios
            document.getElementById("formEditarCurso").addEventListener("submit", function(e){
                e.preventDefault();
                let formData = new FormData();
                formData.append('accion', 'actualizar');
                formData.append('id_curso', id_curso);
                formData.append('nombre', document.getElementById("nombreEdit").value);
                formData.append('categoria', document.getElementById("categoriaEdit").value);
                formData.append('docente', document.getElementById("docenteEdit").value);
                formData.append('descripcion', document.getElementById("descripcionEdit").value);

                fetch('../../controlador/CursoControlador.php', { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert(data.mensaje);
                        localStorage.removeItem("editarCursoID");
                        window.location.href = "lista_cursos.html";
                    } else { alert(data.mensaje); }
                });
            });
        });
    </script>
</body>
</html>
