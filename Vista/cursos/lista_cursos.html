<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Cursos | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary">Catálogo de Asignaturas</h2>
            <a href="crear_curso.html" class="btn btn-primary fw-bold shadow-sm" id="btnCrearCurso">
                + Ofertar Nuevo Curso
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre del Curso</th>
                                <th>Categoría</th>
                                <th>Docente Asignado</th>
                                <th>Estado</th>
                                <th class="text-center">Opciones</th>
                            </tr>
                        </thead>
                        
                        <tbody id="tablaCursos"></tbody>

                    </table>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="../dashboard.html" class="btn btn-secondary btn-sm fw-bold">← Volver al Dashboard</a>
        </div>

    </div>

    <script src="../js/navegacion.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
            let tabla = document.getElementById("tablaCursos");
            
            let esAlumno = (usuarioActivo && usuarioActivo.rol === "Alumno");
            if(esAlumno) {
                let btnCrear = document.getElementById("btnCrearCurso");
                if(btnCrear) btnCrear.style.display = "none";
            }

            function cargarCursos() {
                fetch('../../controlador/CursoControlador.php?accion=listar')
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        tabla.innerHTML = "";
                        if(data.data.length === 0) {
                            tabla.innerHTML = "<tr><td colspan='5' class='text-center text-muted py-3'>No hay materias registradas en este momento.</td></tr>";
                            return;
                        }
                        data.data.forEach((c) => {
                            let botonesAccion = "";
                            if(esAlumno) {
                                botonesAccion = `<button class="btn btn-outline-success btn-sm fw-bold w-100" onclick="verDetalle(${c.id_curso})">Ver Detalles</button>`;
                            } else {
                                botonesAccion = `
                                    <button class="btn btn-outline-success btn-sm fw-bold" onclick="verDetalle(${c.id_curso})">Ver</button>
                                    <button class="btn btn-warning btn-sm text-dark fw-bold" onclick="editarCurso(${c.id_curso})">Editar</button>
                                    <button class="btn btn-danger btn-sm fw-bold" onclick="eliminarCurso(${c.id_curso})">Eliminar</button>
                                `;
                            }

                            tabla.innerHTML += `
                            <tr>
                                <td class="fw-bold text-dark">${c.nombre}</td>
                                <td>${c.categoria}</td>
                                <td class="text-secondary">${c.docente}</td>
                                <td><span class="badge bg-success">Activo</span></td>
                                <td class="text-center d-flex gap-1 justify-content-center">${botonesAccion}</td>
                            </tr>`;
                        });
                    }
                })
                .catch(error => console.error('Error:', error));
            }

            window.eliminarCurso = function(id_curso) {
                if(confirm("¿Está seguro de borrar esta materia del catálogo?")) {
                    let formData = new FormData();
                    formData.append('accion', 'eliminar');
                    formData.append('id_curso', id_curso);

                    fetch('../../controlador/CursoControlador.php', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'success') {
                            cargarCursos();
                        } else {
                            alert(data.mensaje);
                        }
                    });
                }
            }

            window.editarCurso = function(id_curso) {
                localStorage.setItem("editarCursoID", id_curso);
                window.location.href = "editar_curso.html";
            }

            window.verDetalle = function(id_curso) {
                localStorage.setItem("detalleCursoID", id_curso);
                window.location.href = "detalle_curso.html";
            }

            cargarCursos();
        });
    </script>
</body>
</html>
