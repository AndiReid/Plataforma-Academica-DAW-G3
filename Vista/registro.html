<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Plataforma DAW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">Plataforma DAW</h2>
                        <p class="text-muted">Complete el formulario para solicitar su acceso</p>
                    </div>

                    <form id="formRegistro">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Nombre Completo</label>
                            <input type="text" id="regNombre" class="form-control bg-light border-0" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Correo Electrónico</label>
                            <input type="email" id="regCorreo" class="form-control bg-light border-0" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Contraseña</label>
                            <input type="password" id="regClave" class="form-control bg-light border-0" required minlength="5">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary small">Tipo de Cuenta</label>
                            <select id="regRol" class="form-select bg-light border-0" required>
                                <option value="" disabled selected>Seleccione su rol...</option>
                                <option value="Alumno">Estudiante / Alumno</option>
                                <option value="Docente">Docente / Profesor</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 fw-bold rounded-3 py-2 mb-3 shadow-sm">Crear Cuenta</button>
                        
                        <div class="text-center mt-3">
                            <span class="text-muted small">¿Ya tiene una cuenta?</span> 
                            <a href="index.html" class="text-primary fw-bold text-decoration-none small">Iniciar Sesión</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let form = document.getElementById("formRegistro");
            
            if(form) {
                form.addEventListener("submit", function(e) {
                    e.preventDefault(); 
                    
                    let formData = new FormData();
                    formData.append('accion', 'registro');
                    formData.append('nombre', document.getElementById("regNombre").value);
                    formData.append('correo', document.getElementById("regCorreo").value);
                    formData.append('clave', document.getElementById("regClave").value);
                    formData.append('rol', document.getElementById("regRol").value);

                    fetch('../controlador/UsuarioControlador.php', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'success') {
                            alert("Cuenta creada exitosamente en la Base de Datos. Ahora puede iniciar sesión.");
                            window.location.href = "../index.html";
                        } else {
                            alert(data.mensaje);
                        }
                    })
                    .catch(error => console.error('Error en la petición AJAX:', error));
                });
            }
        });
    </script>
</body>
</html>
